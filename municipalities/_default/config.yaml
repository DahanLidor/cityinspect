city:
  id: _default
  name: "עירייה"
  timezone: "Asia/Jerusalem"
  language: he
  working_hours:
    sun_thu: "07:00-19:00"
    fri: "07:00-14:00"
    sat: null

bot:
  channel: whatsapp
  auto_approve_low: true          # LOW severity → ללא אישור אנושי
  require_photo_on_close: true    # חובה תמונת אחרי לסגירה
  require_photo_on_arrival: true  # חובה תמונת לפני בהגעה

sla_hours:
  critical: 4
  high: 24
  medium: 72
  low: 336                        # 14 יום

escalation:
  reminder_at_pct: 50             # תזכורת כשנשאר 50% מה-SLA
  warning_at_pct: 80              # אזהרה כשנשאר 20%
  escalate_at_pct: 100            # escalate כשחרג

approval_rules:
  critical: infrastructure_manager
  high: work_manager
  medium: work_manager
  low: auto
