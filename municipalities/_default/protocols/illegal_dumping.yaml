protocol:
  id: illegal_dumping
  name: "פינוי השלכת פסולת"
  defect_type: illegal_dumping
  version: "1.0"

  steps:
    - id: manager_approval
      name: "אישור מנהל + תיעוד"
      owner_role: work_manager
      allowed_actions: [approve, reject]
      required_before_advance: [approve]
      timeout_hours: 4
      on_timeout: escalate_up
      skip_allowed: false
      message_template: notify_manager_new_ticket
      note: "יש לתעד את המקום לצורך אכיפה"

    - id: documentation
      name: "תיעוד פסולת לאכיפה"
      owner_role: field_worker
      allowed_actions: [documented]
      required_gates:
        - type: photo
          label: "תמונת פסולת"
          key: photo_dumping
      required_before_advance: [documented]
      auto_trigger: true
      timeout_hours: 2
      skip_allowed: false

    - id: contractor_assignment
      name: "שיגור צוות פינוי"
      owner_role: work_manager
      allowed_actions: [assign_contractor]
      required_before_advance: [assign_contractor]
      auto_trigger: true
      timeout_hours: 4
      on_timeout: escalate_up
      skip_allowed: false

    - id: contractor_confirm
      name: "אישור צוות פינוי"
      owner_role: contractor
      allowed_actions: [confirm_time, decline]
      required_before_advance: [confirm_time]
      timeout_hours: 4
      on_timeout: reassign
      skip_allowed: false
      message_template: notify_contractor_assignment

    - id: removal
      name: "פינוי הפסולת"
      owner_role: field_worker
      allowed_actions: [removal_done]
      required_gates:
        - type: photo
          label: "תמונה לאחר פינוי"
          key: photo_after
      required_before_advance: [removal_done]
      skip_allowed: false

    - id: site_disinfection
      name: "חיטוי האתר"
      owner_role: field_worker
      allowed_actions: [disinfection_done]
      required_before_advance: [disinfection_done]
      skip_allowed: false

    - id: close
      name: "סגירת טיקט"
      owner_role: work_manager
      allowed_actions: [close]
      auto_trigger: true
      required_before_advance: [close]
      skip_allowed: false
      final_step: true

  team_required:
    - role: field_worker
      count: 2
    - role: contractor
      count: 1

  estimated_hours: 1.5
