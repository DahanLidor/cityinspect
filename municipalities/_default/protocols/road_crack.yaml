protocol:
  id: road_crack
  name: "תיקון סדק בכביש"
  defect_type: road_crack
  version: "1.0"

  steps:
    - id: manager_approval
      name: "אישור מנהל"
      owner_role: work_manager
      allowed_actions: [approve, reject]
      required_before_advance: [approve]
      timeout_hours: 4
      on_timeout: escalate_up
      skip_allowed: false
      message_template: notify_manager_new_ticket

    - id: contractor_assignment
      name: "הקצאת צוות"
      owner_role: work_manager
      allowed_actions: [assign_contractor]
      required_before_advance: [assign_contractor]
      auto_trigger: true
      timeout_hours: 2
      skip_allowed: false

    - id: contractor_confirm
      name: "אישור קבלן"
      owner_role: contractor
      allowed_actions: [confirm_time, decline]
      required_before_advance: [confirm_time]
      timeout_hours: 4
      on_timeout: reassign
      skip_allowed: false

    - id: site_arrival
      name: "הגעה לאתר"
      owner_role: contractor
      allowed_actions: [arrived]
      required_gates:
        - type: photo
          label: "תמונת סדק לפני טיפול"
          key: photo_before
      required_before_advance: [arrived]
      skip_allowed: false
      gate_event: true

    - id: crack_treatment
      name: "טיפול בסדק"
      owner_role: field_worker
      allowed_actions: [treatment_done]
      required_gates:
        - type: photo
          label: "תמונה תוך כדי הזרקה"
          key: photo_during
      required_before_advance: [treatment_done]
      skip_allowed: false

    - id: curing_wait
      name: "המתנה להתקשות"
      owner_role: field_worker
      allowed_actions: [curing_complete]
      wait_minutes: 30
      skip_allowed: false
      note: "יש להמתין להתקשות החומר לפני פתיחת הנתיב"

    - id: inspection
      name: "אימות מפקח"
      owner_role: inspector
      allowed_actions: [approve, reject_redo]
      required_gates:
        - type: photo
          label: "תמונת אחרי"
          key: photo_after
      required_before_advance: [approve]
      timeout_hours: 6
      skip_allowed: false

    - id: close
      name: "סגירת טיקט"
      owner_role: work_manager
      allowed_actions: [close]
      auto_trigger: true
      final_step: true

  materials:
    - name: "שרף הזרקה"
      unit: liter
      formula: "crack_length_m * 0.15"
    - name: "חומר איטום"
      unit: kg
      formula: "crack_length_m * 0.3"

  team_required:
    - role: field_worker
      count: 1
    - role: contractor
      count: 1

  estimated_hours: 1.5
