name: CityInspect
options:
  bundleIdPrefix: com.cityinspect
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""   # ← הכנס את Team ID שלך מ-Xcode
    PRODUCT_BUNDLE_IDENTIFIER: com.cityinspect.app

targets:
  CityInspect:
    type: application
    platform: iOS
    sources:
      - path: CityInspect
    info:
      path: CityInspect/Info.plist
      properties:
        NSCameraUsageDescription: "CityInspect צריכה גישה למצלמה לצילום תקלות תשתית"
        NSLocationWhenInUseUsageDescription: "CityInspect צריכה גישה למיקום לדיוק בדיווח התקלה"
        NSPhotoLibraryUsageDescription: "CityInspect צריכה גישה לגלריה להוספת תמונות קיימות"
        NSPhotoLibraryAddUsageDescription: "CityInspect שומרת תמונות לגלריה"
        UIRequiresFullScreen: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        INFOPLIST_FILE: CityInspect/Info.plist
    dependencies: []
