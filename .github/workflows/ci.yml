name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt aiosqlite

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ANTHROPIC_API_KEY: ""
          GOOGLE_MAPS_KEY: ""
          ALLOWED_ORIGINS: '["*"]'
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Backend lint ───────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install linters
        run: pip install ruff mypy
      - name: ruff check
        run: ruff check app/ --select=E,W,F,I --ignore=E501
      - name: mypy (non-blocking)
        run: mypy app/ --ignore-missing-imports --no-strict-optional || true

  # ── AI Service ────────────────────────────────────────────────────────────
  ai-service:
    name: AI Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies (no torch/GPU in CI)
        run: |
          pip install fastapi uvicorn pillow numpy httpx pytest pytest-asyncio

      - name: Run AI service smoke tests
        run: |
          python -c "from hazard_detection import HazardDetector; print('Import OK')" || true
          python -m pytest tests/ -v --tb=short || true

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Vitest
        run: npm test

      - name: Build
        run: npm run build
        env:
          CI: false  # Don't fail on warnings

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: cityinspect-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ai-service image
        uses: docker/build-push-action@v5
        with:
          context: ai-service
          push: false
          tags: cityinspect-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit on backend
        run: bandit -r backend/app/ -ll -ii --exclude backend/app/seed.py || true
