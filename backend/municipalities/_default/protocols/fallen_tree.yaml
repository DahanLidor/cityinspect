protocol:
  id: fallen_tree
  name: "פינוי עץ מפריע לציבור"
  defect_type: fallen_tree
  version: "1.0"

  steps:
    - id: manager_approval
      name: "אישור מנהל + הערכת סכנה"
      owner_role: work_manager
      allowed_actions: [approve, reject]
      required_before_advance: [approve]
      timeout_hours: 1
      on_timeout: escalate_up
      skip_allowed: false
      message_template: notify_manager_new_ticket
      note: "עץ נפול עלול לחסום דרכים ולסכן עוברי אורח — טיפול מידי"

    - id: safety_barricade
      name: "הקמת מחסום בטיחות"
      owner_role: field_worker
      allowed_actions: [barricade_set]
      required_gates:
        - type: photo
          label: "תמונת עץ + מחסום"
          key: photo_barricade
      required_before_advance: [barricade_set]
      auto_trigger: true
      timeout_hours: 1
      skip_allowed: false

    - id: contractor_assignment
      name: "הקצאת צוות גיזום"
      owner_role: work_manager
      allowed_actions: [assign_contractor]
      required_before_advance: [assign_contractor]
      auto_trigger: true
      timeout_hours: 2
      on_timeout: escalate_up
      skip_allowed: false

    - id: contractor_confirm
      name: "אישור קבלן"
      owner_role: contractor
      allowed_actions: [confirm_time, decline]
      required_before_advance: [confirm_time]
      timeout_hours: 2
      on_timeout: reassign
      skip_allowed: false
      message_template: notify_contractor_assignment

    - id: removal
      name: "פינוי העץ"
      owner_role: field_worker
      allowed_actions: [removal_done]
      required_gates:
        - type: photo
          label: "תמונה לאחר פינוי"
          key: photo_after
      required_before_advance: [removal_done]
      skip_allowed: false

    - id: site_cleanup
      name: "ניקוי אתר"
      owner_role: field_worker
      allowed_actions: [cleanup_done]
      required_before_advance: [cleanup_done]
      skip_allowed: false

    - id: close
      name: "סגירת טיקט"
      owner_role: work_manager
      allowed_actions: [close]
      auto_trigger: true
      required_before_advance: [close]
      skip_allowed: false
      final_step: true

  team_required:
    - role: field_worker
      count: 2
    - role: contractor
      count: 1

  estimated_hours: 2
