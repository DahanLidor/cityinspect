protocol:
  id: leaning_pole
  name: "יישור / החלפת עמוד עקום"
  defect_type: leaning_pole
  version: "1.0"

  steps:
    - id: manager_approval
      name: "אישור מנהל + הערכת סכנה"
      owner_role: work_manager
      allowed_actions: [approve, reject]
      required_before_advance: [approve]
      timeout_hours: 1
      on_timeout: escalate_up
      skip_allowed: false
      message_template: notify_manager_new_ticket
      note: "עמוד עקום עלול להוות סכנת בטיחות — טיפול מידי"

    - id: safety_barricade
      name: "הקמת מחסום בטיחות"
      owner_role: field_worker
      allowed_actions: [barricade_set]
      required_gates:
        - type: photo
          label: "תמונת מחסום"
          key: photo_barricade
      required_before_advance: [barricade_set]
      auto_trigger: true
      timeout_hours: 1
      skip_allowed: false

    - id: contractor_assignment
      name: "הקצאת צוות"
      owner_role: work_manager
      allowed_actions: [assign_contractor]
      required_before_advance: [assign_contractor]
      auto_trigger: true
      timeout_hours: 2
      on_timeout: escalate_up
      skip_allowed: false

    - id: contractor_confirm
      name: "אישור קבלן"
      owner_role: contractor
      allowed_actions: [confirm_time, decline]
      required_before_advance: [confirm_time]
      timeout_hours: 3
      on_timeout: reassign
      skip_allowed: false
      message_template: notify_contractor_assignment

    - id: pole_repair
      name: "יישור / החלפת עמוד"
      owner_role: field_worker
      allowed_actions: [repair_done]
      required_gates:
        - type: photo
          label: "תמונת לפני"
          key: photo_before
        - type: photo
          label: "תמונת אחרי"
          key: photo_after
      required_before_advance: [repair_done]
      skip_allowed: false

    - id: inspection
      name: "אימות מפקח"
      owner_role: inspector
      allowed_actions: [approve, reject_redo]
      required_before_advance: [approve]
      on_reject_redo: pole_repair
      timeout_hours: 4
      skip_allowed: false

    - id: close
      name: "סגירת טיקט"
      owner_role: work_manager
      allowed_actions: [close]
      auto_trigger: true
      required_before_advance: [close]
      skip_allowed: false
      final_step: true

  team_required:
    - role: field_worker
      count: 2
    - role: contractor
      count: 1
    - role: inspector
      count: 1

  estimated_hours: 3
