<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoadSense Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#f1f5f9;font-family:'Segoe UI',sans-serif;overflow-x:hidden;direction:rtl}
.hdr{background:#111827;border-bottom:1px solid #1e293b;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-i{width:30px;height:30px;border-radius:7px;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.live{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.ld{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;background:#111827;border-bottom:1px solid #1e293b;padding:0 20px}
.tab{background:none;border:none;padding:11px 18px;cursor:pointer;font-size:12px;color:#94a3b8;border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:#3b82f6;border-bottom-color:#3b82f6;font-weight:600}
.mn{padding:16px 20px}
.mets{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.met{background:#111827;border-radius:10px;padding:14px 16px;border:1px solid #1e293b}
.met-l{font-size:11px;color:#64748b}
.met-v{font-size:24px;font-weight:600;margin-top:4px}
.met-s{font-size:11px;color:#64748b;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 340px;gap:14px;margin-bottom:14px}
.cd{background:#111827;border-radius:10px;border:1px solid #1e293b;padding:16px}
.ct{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%}
.al{padding:9px 11px;border-radius:7px;margin-bottom:6px;cursor:pointer;border-right:3px solid}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:#64748b;font-weight:600;padding:8px 10px;text-align:right;background:#0f172a}
.tbl td{padding:10px;font-size:12px;border-top:1px solid #1e293b}
.tbl tr{cursor:pointer;transition:.15s}
.tbl tr:hover{background:#1e293b30}
.tbl tr.sel{background:#1e3a5f40}
.sev{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.pb{height:5px;background:#1e293b;border-radius:3px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-left:6px}
.pb-f{height:100%;border-radius:3px}
.st{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.det{background:#111827;border-radius:10px;border:1px solid #1e293b;padding:16px;margin-top:14px;display:none}
.det.show{display:block}
.filters{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.flt{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:6px 12px;font-size:12px;color:#f1f5f9;font-family:inherit}
.flt-l{font-size:11px;color:#64748b;margin-left:4px}
.det-card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.2s}
.det-card:hover{border-color:#3b82f6}
.det-card.open{border-color:#3b82f6}
.det-hdr{display:flex;align-items:center;gap:10px}
.det-num{width:28px;height:28px;border-radius:7px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#94a3b8;flex-shrink:0}
.det-info{flex:1}
.det-title{font-size:13px;font-weight:600;color:#f1f5f9}
.det-meta{font-size:11px;color:#64748b;margin-top:2px}
.det-img{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0}
.det-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #1e293b}
.det-card.open .det-body{display:block}
.det-props{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.det-prop{background:#111827;padding:6px 8px;border-radius:6px}
.det-prop-l{font-size:10px;color:#64748b}
.det-prop-v{font-size:13px;font-weight:600;color:#f1f5f9}
.det-full-img{width:100%;border-radius:8px;margin-bottom:8px;max-height:250px;object-fit:cover;cursor:pointer}
.ag{margin-top:10px;padding:10px;background:#111827;border-radius:8px;border-right:3px solid}
.ag-t{font-size:12px;font-weight:600;margin-bottom:4px}
.ag-b{font-size:11px;color:#94a3b8;line-height:1.6}
.ag-b strong{color:#f1f5f9}
.img-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000e;z-index:100;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.img-overlay.show{display:flex}
.img-overlay img{max-width:90vw;max-height:90vh;border-radius:8px}
.tc{display:none}.tc.on{display:block}
@media(max-width:900px){.mets{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="logo-i">RS</div><div><div style="font-size:14px;font-weight:600">RoadSense</div><div style="font-size:11px;color:#64748b">לוח בקרה מבצעי</div></div></div>
  <div class="live"><div class="ld"></div><span id="lv">מתחבר...</span></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('ov')">סקירה כללית</button>
  <button class="tab" onclick="sw('pr')">תור עדיפויות</button>
</div>
<div class="mn">
<div class="tc on" id="tc-ov">
  <div class="mets">
    <div class="met"><div class="met-l">טיקטים פתוחים</div><div class="met-v" id="m0">—</div><div class="met-s">לא כולל resolved</div></div>
    <div class="met"><div class="met-l">קריטיים</div><div class="met-v" style="color:#ef4444" id="m1">—</div><div class="met-s">דורשים תגובה מיידית</div></div>
    <div class="met"><div class="met-l">סה״כ טיקטים</div><div class="met-v" id="m2">—</div><div class="met-s">מאז הפעלה</div></div>
    <div class="met"><div class="met-l">זיהויים</div><div class="met-v" style="color:#3b82f6" id="m3">—</div><div class="met-s">סה״כ דיווחים</div></div>
    <div class="met"><div class="met-l">טופלו</div><div class="met-v" style="color:#22c55e" id="m4">—</div><div class="met-s">resolved</div></div>
  </div>
  <div class="g2">
    <div class="cd"><div class="ct"><div class="dot" style="background:#3b82f6"></div>מפת מפגעים</div><div style="background:#0a1628;border-radius:8px;height:300px;overflow:hidden"><svg width="100%" height="100%" viewBox="0 0 500 300" id="mapSvg"></svg></div></div>
    <div class="cd"><div class="ct"><div class="dot" style="background:#ef4444"></div>התראות דחופות</div><div id="alerts"></div></div>
  </div>
</div>
<div class="tc" id="tc-pr">
  <div class="filters">
    <span class="flt-l">מתאריך:</span><input type="date" class="flt" id="fltFrom">
    <span class="flt-l">עד:</span><input type="date" class="flt" id="fltTo">
    <span class="flt-l">שעה:</span><input type="time" class="flt" id="fltTimeFrom" value="00:00">
    <span class="flt-l">עד:</span><input type="time" class="flt" id="fltTimeTo" value="23:59">
    <button class="flt" style="background:#3b82f6;color:#fff;cursor:pointer;border:none;font-weight:600" onclick="applyFilters()">סנן</button>
    <button class="flt" style="cursor:pointer;color:#94a3b8" onclick="clearFilters()">נקה</button>
  </div>
  <div style="font-size:13px;font-weight:600;margin-bottom:10px">תור עדיפויות — <span id="tCount">0</span> טיקטים</div>
  <div class="cd" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr><th></th><th>מפגע</th><th>חומרה</th><th>ציון</th><th>כתובת</th><th>דיווחים</th><th>תאריך</th><th>סטטוס</th></tr></thead><tbody id="tBody"></tbody></table></div>
  <div class="det" id="detP"></div>
</div>
</div>
<div class="img-overlay" id="imgOv" onclick="this.style.display='none'"><img id="imgOvS"/></div>

<script>
const API=window.location.origin;
let TK=null,allT=[],filteredT=[];
const SC={critical:'#ef4444',high:'#f59e0b',medium:'#3b82f6',low:'#22c55e'};
const SL={critical:'קריטי',high:'גבוה',medium:'בינוני',low:'נמוך'};
const TL={pothole:'בור',road_crack:'סדק',broken_light:'פנס תקול',drainage_blocked:'ביוב חסום',sidewalk:'מדרכה שבורה'};
const XL={new:'חדש',verified:'מאומת',assigned:'הוקצה',in_progress:'בטיפול',resolved:'טופל'};

async function auth(){
  try{const r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})});
  if(r.ok){const d=await r.json();TK=d.access_token;return true}}catch(e){}return false}
function H(){return TK?{Authorization:'Bearer '+TK}:{}}

async function load(){
  document.getElementById('lv').textContent='מתחבר...';
  if(!await auth()){document.getElementById('lv').textContent='שגיאה';return}
  document.getElementById('lv').textContent='Live — מחובר';
  try{const r=await fetch(API+'/api/stats/summary',{headers:H()});if(r.ok){const s=await r.json();
    document.getElementById('m0').textContent=s.open_tickets||0;
    document.getElementById('m1').textContent=s.critical_tickets||0;
    document.getElementById('m2').textContent=s.total_tickets||0;
    document.getElementById('m4').textContent=s.by_status?.resolved||0;
    let det=0;Object.values(s.by_type||{}).forEach(v=>det+=v);document.getElementById('m3').textContent=det;
  }}catch(e){}
  try{const r=await fetch(API+'/api/tickets?limit=200',{headers:H()});if(r.ok){allT=await r.json();
    filteredT=[...allT];
    buildMap();buildAlerts();buildTable();
  }}catch(e){}}

function pri(t){const s={critical:85,high:65,medium:40,low:15};let p=s[t.severity]||20;
  if(t.detections&&t.detections[0]){const d=t.detections[0];if(d.defect_depth_cm>10)p+=8;if(d.surface_area_m2>0.3)p+=5}
  p+=Math.min(t.detection_count*2,10);return Math.min(p,100)}

// Filters
function applyFilters(){
  const from=document.getElementById('fltFrom').value;
  const to=document.getElementById('fltTo').value;
  const tf=document.getElementById('fltTimeFrom').value||'00:00';
  const tt=document.getElementById('fltTimeTo').value||'23:59';
  filteredT=allT.filter(t=>{
    if(!t.created_at)return true;
    const d=new Date(t.created_at);
    if(from){const fd=new Date(from+'T'+tf);if(d<fd)return false}
    if(to){const td=new Date(to+'T'+tt+':59');if(d>td)return false}
    return true;
  });
  buildTable();
}
function clearFilters(){
  document.getElementById('fltFrom').value='';document.getElementById('fltTo').value='';
  document.getElementById('fltTimeFrom').value='00:00';document.getElementById('fltTimeTo').value='23:59';
  filteredT=[...allT];buildTable();
}

function buildMap(){
  const svg=document.getElementById('mapSvg');if(!allT.length)return;
  const la=allT.map(t=>t.lat),lo=allT.map(t=>t.lng);
  const mla=Math.min(...la),xla=Math.max(...la),mlo=Math.min(...lo),xlo=Math.max(...lo);
  const pad=0.001;let h='';
  for(let i=1;i<5;i++)h+=`<line x1="0" y1="${i*60}" x2="500" y2="${i*60}" stroke="#1a2640" stroke-width=".5"/>`;
  for(let i=1;i<5;i++)h+=`<line x1="${i*100}" y1="0" x2="${i*100}" y2="300" stroke="#1a2640" stroke-width=".5"/>`;
  allT.filter(t=>t.status!=='resolved').forEach(t=>{
    const x=20+((t.lng-(mlo-pad))/((xlo+pad)-(mlo-pad)))*460;
    const y=20+((xla+pad-t.lat)/((xla+pad)-(mla-pad)))*260;
    const c=SC[t.severity]||'#3b82f6',r=t.severity==='critical'?8:t.severity==='high'?7:5;
    h+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" opacity=".7" onclick="sw('pr');sel(${t.id})" style="cursor:pointer"/>`;
    if(t.severity==='critical')h+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" opacity=".5"><animate attributeName="r" values="${r};${r+4};${r}" dur="2s" repeatCount="indefinite"/></circle>`;
  });svg.innerHTML=h}

function buildAlerts(){
  const el=document.getElementById('alerts');let h='';
  allT.filter(t=>t.severity==='critical'&&t.status!=='resolved').forEach(t=>{
    h+=`<div class="al" style="background:#ef444410;border-color:#ef4444" onclick="sw('pr');sel(${t.id})"><div style="font-size:12px;font-weight:600">${TL[t.defect_type]||t.defect_type} — ${t.address}</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">${t.detection_count} דיווחים | קריטי</div></div>`;});
  allT.filter(t=>t.severity==='high'&&t.status!=='resolved').slice(0,3).forEach(t=>{
    h+=`<div class="al" style="background:#f59e0b10;border-color:#f59e0b" onclick="sw('pr');sel(${t.id})"><div style="font-size:12px;font-weight:600">${TL[t.defect_type]||t.defect_type} — ${t.address}</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">${t.detection_count} דיווחים | גבוה</div></div>`;});
  if(!h)h='<div style="padding:20px;text-align:center;color:#64748b">אין התראות</div>';el.innerHTML=h}

function buildTable(){
  const s=[...filteredT].filter(t=>t.status!=='resolved').sort((a,b)=>pri(b)-pri(a));
  document.getElementById('tCount').textContent=s.length;
  document.getElementById('tBody').innerHTML=s.map(t=>{
    const p=pri(t),pc=p>80?'#ef4444':p>60?'#f59e0b':p>40?'#3b82f6':'#22c55e';
    const sc=t.status==='new'?'#f59e0b':t.status==='in_progress'?'#3b82f6':'#22c55e';
    const dt=t.created_at?new Date(t.created_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    return`<tr onclick="sel(${t.id})" id="r${t.id}"><td><div class="dot" style="background:${SC[t.severity]}"></div></td><td style="font-weight:500">${TL[t.defect_type]||t.defect_type}</td><td><span class="sev" style="background:${SC[t.severity]}20;color:${SC[t.severity]}">${SL[t.severity]||t.severity}</span></td><td><div class="pb"><div class="pb-f" style="width:${p}%;background:${pc}"></div></div> <b style="color:${pc}">${p}</b></td><td style="font-size:11px;color:#94a3b8">${t.address||''}</td><td>${t.detection_count}</td><td style="font-size:11px;color:#64748b">${dt}</td><td><span class="st" style="background:${sc}20;color:${sc}">${XL[t.status]||t.status}</span></td></tr>`}).join('')}

function sel(id){
  document.querySelectorAll('.tbl tr').forEach(r=>r.classList.remove('sel'));
  const row=document.getElementById('r'+id);if(row)row.classList.add('sel');
  const t=allT.find(x=>x.id===id);if(!t)return;
  const p=pri(t);
  const dets=t.detections||[];
  const dp=document.getElementById('detP');dp.classList.add('show');
  
  dp.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div>
      <h3 style="font-size:17px;font-weight:600">${TL[t.defect_type]||t.defect_type} — ${t.address||''}</h3>
      <div style="font-size:12px;color:#64748b;margin-top:4px">טיקט מאגד #${t.id} | ${dets.length} דיווחים | ציון ${p}/100</div>
    </div>
    <span class="sev" style="background:${SC[t.severity]}20;color:${SC[t.severity]};font-size:13px;padding:4px 12px">${SL[t.severity]||t.severity}</span>
  </div>
  
  <div style="font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:8px">דיווחים (${dets.length})</div>
  
  ${dets.length===0?'<div style="padding:20px;text-align:center;color:#64748b">אין דיווחים</div>':
  dets.map((d,i)=>{
    const imgUrl=d.image_url||'';
    const hasImg=imgUrl.length>0;
    const fullImg=imgUrl.startsWith('/')?API+imgUrl:imgUrl;
    const time=d.detected_at?new Date(d.detected_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    
    // Parse pipeline data from notes
    let pipeline=null;
    try{if(d.notes&&d.notes.startsWith('{'))pipeline=JSON.parse(d.notes)}catch(e){}
    const vlm=pipeline?.vlm||null;
    const env=pipeline?.environment||null;
    const dedup=pipeline?.dedup||null;
    const score=pipeline?.score||null;
    
    return '<div class="det-card" onclick="toggleDet(this)">'+
      '<div class="det-hdr">'+
        '<div class="det-num">#'+(i+1)+'</div>'+
        '<div class="det-info">'+
          '<div class="det-title">דיווח '+(i+1)+' — '+(d.reported_by||'system')+'</div>'+
          '<div class="det-meta">'+time+(d.defect_depth_cm?' | עומק: '+d.defect_depth_cm+' cm':'')+'</div>'+
        '</div>'+
        (hasImg?'<img class="det-img" src="'+fullImg+'" onerror="this.style.display=\'none\'"/>':'')+
      '</div>'+
      '<div class="det-body">'+
        // Image
        (hasImg?'<img class="det-full-img" src="'+fullImg+'" onclick="document.getElementById(\'imgOv\').style.display=\'flex\';document.getElementById(\'imgOvS\').src=this.src" onerror="this.style.display=\'none\'"/>':'')+
        // Measurements
        '<div class="det-props">'+
          '<div class="det-prop"><div class="det-prop-l">עומק</div><div class="det-prop-v">'+(d.defect_depth_cm?d.defect_depth_cm+' cm':'—')+'</div></div>'+
          '<div class="det-prop"><div class="det-prop-l">רוחב</div><div class="det-prop-v">'+(d.defect_width_cm?d.defect_width_cm+' cm':'—')+'</div></div>'+
          '<div class="det-prop"><div class="det-prop-l">אורך</div><div class="det-prop-v">'+(d.defect_length_cm?d.defect_length_cm+' cm':'—')+'</div></div>'+
          '<div class="det-prop"><div class="det-prop-l">נפח</div><div class="det-prop-v">'+(d.defect_volume_m3?(d.defect_volume_m3).toFixed(4)+' m³':'—')+'</div></div>'+
          '<div class="det-prop"><div class="det-prop-l">שטח</div><div class="det-prop-v">'+(d.surface_area_m2?(d.surface_area_m2).toFixed(3)+' m²':'—')+'</div></div>'+
          '<div class="det-prop"><div class="det-prop-l">מזהה</div><div class="det-prop-v">#'+d.id+'</div></div>'+
        '</div>'+
        // Agent results
        (vlm?'<div class="ag" style="border-color:#a855f7"><div class="ag-t" style="color:#a855f7">🔍 Agent VLM</div><div class="ag-b">'+
          '<strong>סוג:</strong> '+(vlm.hazard_type||'—')+' | <strong>ביטחון:</strong> '+((vlm.confidence||0)*100).toFixed(0)+'%<br>'+
          '<strong>תיאור:</strong> '+(vlm.description||'—')+'<br>'+
          '<strong>סיכון נזיקין:</strong> '+(vlm.liability_risk||'—')+
        '</div></div>':'')+
        (env?'<div class="ag" style="border-color:#22c55e"><div class="ag-t" style="color:#22c55e">🌍 Agent סביבה</div><div class="ag-b">'+
          '<strong>ציון סביבה:</strong> '+(env.environment_score||0)+'/100<br>'+
          (env.risk_factors?'<strong>גורמי סיכון:</strong> '+env.risk_factors.join(', '):'')+
        '</div></div>':'')+
        (dedup?'<div class="ag" style="border-color:#f59e0b"><div class="ag-t" style="color:#f59e0b">🔄 Agent כפילויות</div><div class="ag-b">'+
          (dedup.is_duplicate?'<strong style="color:#ef4444">כפילות!</strong> של דיווח #'+dedup.duplicate_of:'<strong style="color:#22c55e">ייחודי</strong> — '+dedup.reason)+
        '</div></div>':'')+
        (score?'<div class="ag" style="border-color:#3b82f6"><div class="ag-t" style="color:#3b82f6">📊 Agent משקלל</div><div class="ag-b">'+
          '<strong>ציון סופי:</strong> <span style="font-size:16px;font-weight:700;color:'+
          (score.final_score>=80?'#ef4444':score.final_score>=60?'#f59e0b':score.final_score>=35?'#3b82f6':'#22c55e')+'">'+
          score.final_score+'/100</span> → <strong>'+
          (SL[score.severity]||score.severity)+'</strong><br>'+
          '<strong>החלטה:</strong> '+(score.action==='alert'?'🚨 התראה':'📋 מעקב')+'<br>'+
          (score.reasoning?'<strong>נימוק:</strong> '+score.reasoning:'')+
          (score.breakdown?'<br><strong>פירוט:</strong> VLM='+(score.breakdown.vlm||0)+' | סביבה='+(score.breakdown.environment||0)+' | גיאומטריה='+(score.breakdown.geometry||0):'')+
        '</div></div>':'')+
        (!pipeline&&d.image_caption?'<div class="ag" style="border-color:#64748b"><div class="ag-t" style="color:#64748b">📝 הערה</div><div class="ag-b">'+d.image_caption+'</div></div>':'')+
      '</div>'+
    '</div>';
  }).join('')}`;
}

function toggleDet(el){el.classList.toggle('open')}

function sw(id){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  document.getElementById('tc-'+id).classList.add('on');document.querySelectorAll('.tab')[id==='ov'?0:1].classList.add('on')}

// Set default date filter to today
const today=new Date().toISOString().split('T')[0];
document.getElementById('fltFrom').value=today;
document.getElementById('fltTo').value=today;

load();
</script>
