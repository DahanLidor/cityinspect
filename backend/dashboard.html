<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoadSense Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#f1f5f9;font-family:'Segoe UI',sans-serif;overflow-x:hidden;direction:rtl}
.hdr{background:#111827;border-bottom:1px solid #1e293b;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-i{width:30px;height:30px;border-radius:7px;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.live{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.ld{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;background:#111827;border-bottom:1px solid #1e293b;padding:0 20px}
.tab{background:none;border:none;padding:11px 18px;cursor:pointer;font-size:12px;color:#94a3b8;border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:#3b82f6;border-bottom-color:#3b82f6;font-weight:600}
.mn{padding:16px 20px}
.mets{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.met{background:#111827;border-radius:10px;padding:14px 16px;border:1px solid #1e293b}
.met-l{font-size:11px;color:#64748b}
.met-v{font-size:24px;font-weight:600;margin-top:4px}
.met-s{font-size:11px;color:#64748b;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 340px;gap:14px;margin-bottom:14px}
.cd{background:#111827;border-radius:10px;border:1px solid #1e293b;padding:16px}
.ct{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%}
.al{padding:9px 11px;border-radius:7px;margin-bottom:6px;cursor:pointer;border-right:3px solid}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:#64748b;font-weight:600;padding:8px 10px;text-align:right;background:#0f172a}
.tbl td{padding:10px;font-size:12px;border-top:1px solid #1e293b}
.tbl tr{cursor:pointer;transition:.15s}
.tbl tr:hover{background:#1e293b30}
.tbl tr.sel{background:#1e3a5f40}
.sev{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.pb{height:5px;background:#1e293b;border-radius:3px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-left:6px}
.pb-f{height:100%;border-radius:3px}
.st{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.det{background:#111827;border-radius:10px;border:1px solid #1e293b;padding:16px;margin-top:14px;display:none}
.det.show{display:block}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pw{position:relative;height:280px;background:#0a1628;border-radius:8px;overflow:hidden}
.pc{width:100%;height:100%;cursor:grab}
.pc.ms{cursor:crosshair}
.ptb{position:absolute;top:6px;right:6px;display:flex;gap:4px;z-index:5}
.pbtn{padding:4px 9px;font-size:10px;background:#111827cc;border:1px solid #1e293b;border-radius:5px;color:#94a3b8;cursor:pointer;font-family:inherit}
.pbtn.on{background:#3b82f630;color:#3b82f6;border-color:#3b82f6}
.mbs{margin-top:8px}
.mb{display:flex;align-items:center;gap:7px;width:100%;background:#0f172a;border:1px solid #1e293b;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-family:inherit;color:#94a3b8;margin-bottom:5px;text-align:right}
.mb:hover{border-color:#3b82f6;color:#f1f5f9}
.mb.on{border-color:#22c55e;background:#22c55e12;color:#22c55e}
.mb.dn{border-color:#3b82f6;background:#3b82f610}
.mi{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.mv{font-weight:700;font-size:12px;min-width:50px;text-align:left;direction:ltr}
.mv.has{color:#22c55e}
.imgs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:6px}
.img-thumb{width:120px;height:90px;border-radius:6px;object-fit:cover;border:2px solid transparent;cursor:pointer;flex-shrink:0}
.img-thumb:hover{border-color:#3b82f6}
.img-thumb.sel{border-color:#3b82f6;box-shadow:0 0 8px #3b82f640}
.img-big{width:100%;border-radius:8px;margin-bottom:8px;max-height:200px;object-fit:cover;cursor:pointer}
.img-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000e;z-index:100;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.img-overlay.show{display:flex}
.img-overlay img{max-width:90vw;max-height:90vh;border-radius:8px}
.ps{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:#111827ee;border:1px solid #22c55e;border-radius:6px;padding:5px 14px;font-size:11px;color:#22c55e;display:none;z-index:5}
.pcf{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:none;gap:6px;z-index:5}
.pcf button{padding:6px 14px;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;border:none;font-weight:600}
.pcf .y{background:#22c55e;color:#fff}
.pcf .n{background:#1e293b;color:#94a3b8}
.gl{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1e293b15}
.gi{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ins{background:#111827;border-radius:10px;border:1px solid #1e293b;border-right:3px solid #3b82f6;padding:14px;margin-top:14px}
.ins-t{font-size:13px;font-weight:600;color:#3b82f6;margin-bottom:6px}
.ins-b{font-size:12px;color:#94a3b8;line-height:1.7}
.ins-b strong{color:#f1f5f9}
.sr{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px}
.sl{color:#64748b;min-width:110px}
.sk{flex:1;height:5px;background:#1e293b;border-radius:3px;overflow:hidden}
.sf{height:100%;border-radius:3px}
.sv{font-weight:600;min-width:24px;text-align:left}
.acts{display:flex;gap:6px;margin-top:12px}
.act{flex:1;padding:10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;text-align:center}
.a1{background:#3b82f6;color:#fff}
.a2{background:transparent;border:1px solid #1e293b;color:#f1f5f9}
.tc{display:none}.tc.on{display:block}
@media(max-width:900px){.mets{grid-template-columns:repeat(3,1fr)}.g2,.dg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="logo-i">RS</div><div><div style="font-size:14px;font-weight:600">RoadSense</div><div style="font-size:11px;color:#64748b">לוח בקרה מבצעי</div></div></div>
  <div class="live"><div class="ld"></div><span id="lv">מתחבר...</span></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('ov')">סקירה כללית</button>
  <button class="tab" onclick="sw('pr')">תור עדיפויות</button>
</div>
<div class="mn">
<div class="tc on" id="tc-ov">
  <div class="mets">
    <div class="met"><div class="met-l">טיקטים פתוחים</div><div class="met-v" id="m0">—</div><div class="met-s">לא כולל resolved</div></div>
    <div class="met"><div class="met-l">קריטיים</div><div class="met-v" style="color:#ef4444" id="m1">—</div><div class="met-s">דורשים תגובה מיידית</div></div>
    <div class="met"><div class="met-l">סה״כ טיקטים</div><div class="met-v" id="m2">—</div><div class="met-s">מאז הפעלה</div></div>
    <div class="met"><div class="met-l">זיהויים</div><div class="met-v" style="color:#3b82f6" id="m3">—</div><div class="met-s">סה״כ דיווחים</div></div>
    <div class="met"><div class="met-l">טופלו</div><div class="met-v" style="color:#22c55e" id="m4">—</div><div class="met-s">resolved</div></div>
  </div>
  <div class="g2">
    <div class="cd"><div class="ct"><div class="dot" style="background:#3b82f6"></div>מפת מפגעים</div><div style="background:#0a1628;border-radius:8px;height:300px;overflow:hidden"><svg width="100%" height="100%" viewBox="0 0 500 300" id="mapSvg"></svg></div></div>
    <div class="cd"><div class="ct"><div class="dot" style="background:#ef4444"></div>התראות דחופות</div><div id="alerts"></div></div>
  </div>
</div>
<div class="tc" id="tc-pr">

</div>
</div>

async function auth(){
  try{const r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})});
  if(r.ok){const d=await r.json();TK=d.access_token;return true}}catch(e){}return false}
function H(){return TK?{Authorization:'Bearer '+TK}:{}}

async function load(){
  document.getElementById('lv').textContent='מתחבר...';
  if(!await auth()){document.getElementById('lv').textContent='שגיאה';return}
  document.getElementById('lv').textContent='Live — מחובר';
  // Stats
  try{const r=await fetch(API+'/api/stats/summary',{headers:H()});if(r.ok){const s=await r.json();
    document.getElementById('m0').textContent=s.open_tickets||0;
    document.getElementById('m1').textContent=s.critical_tickets||0;
    document.getElementById('m2').textContent=s.total_tickets||0;
    document.getElementById('m4').textContent=s.by_status?.resolved||0;
    let det=0;Object.values(s.by_type||{}).forEach(v=>det+=v);document.getElementById('m3').textContent=det;
  }}catch(e){}
  // Tickets
  try{const r=await fetch(API+'/api/tickets?limit=100',{headers:H()});if(r.ok){allT=await r.json();
    buildMap();buildAlerts();buildTable();
  }}catch(e){}}

function pri(t){const s={critical:85,high:65,medium:40,low:15};let p=s[t.severity]||20;
  if(t.detections&&t.detections[0]){const d=t.detections[0];if(d.defect_depth_cm>10)p+=8;if(d.surface_area_m2>0.3)p+=5}
  p+=Math.min(t.detection_count*2,10);return Math.min(p,100)}

function buildMap(){
  const svg=document.getElementById('mapSvg');if(!allT.length)return;
  const la=allT.map(t=>t.lat),lo=allT.map(t=>t.lng);
  const mla=Math.min(...la),xla=Math.max(...la),mlo=Math.min(...lo),xlo=Math.max(...lo);
  const pad=0.001;let h='';
  for(let i=1;i<5;i++)h+=`<line x1="0" y1="${i*60}" x2="500" y2="${i*60}" stroke="#1a2640" stroke-width=".5"/>`;
  for(let i=1;i<5;i++)h+=`<line x1="${i*100}" y1="0" x2="${i*100}" y2="300" stroke="#1a2640" stroke-width=".5"/>`;
  allT.filter(t=>t.status!=='resolved').forEach(t=>{
    const x=20+((t.lng-(mlo-pad))/((xlo+pad)-(mlo-pad)))*460;
    const y=20+((xla+pad-t.lat)/((xla+pad)-(mla-pad)))*260;
    const c=SC[t.severity]||'#3b82f6',r=t.severity==='critical'?8:t.severity==='high'?7:5;
    h+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" opacity=".7"/>`;
    if(t.severity==='critical')h+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" opacity=".5"><animate attributeName="r" values="${r};${r+4};${r}" dur="2s" repeatCount="indefinite"/></circle>`;
  });svg.innerHTML=h}

function buildAlerts(){
  const el=document.getElementById('alerts');let h='';
  allT.filter(t=>t.severity==='critical'&&t.status!=='resolved').forEach(t=>{
    h+=`<div class="al" style="background:#ef444410;border-color:#ef4444" onclick="sw('pr');sel(${t.id})"><div style="font-size:12px;font-weight:600">${TL[t.defect_type]||t.defect_type} — ${t.address}</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">${t.detection_count} דיווחים | קריטי</div></div>`;});
  allT.filter(t=>t.severity==='high'&&t.status!=='resolved').slice(0,3).forEach(t=>{
    h+=`<div class="al" style="background:#f59e0b10;border-color:#f59e0b" onclick="sw('pr');sel(${t.id})"><div style="font-size:12px;font-weight:600">${TL[t.defect_type]||t.defect_type} — ${t.address}</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">${t.detection_count} דיווחים | גבוה</div></div>`;});
  if(!h)h='<div style="padding:20px;text-align:center;color:#64748b">אין התראות</div>';el.innerHTML=h}

function buildTable(){
  const s=[...allT].filter(t=>t.status!=='resolved').sort((a,b)=>pri(b)-pri(a));
  document.getElementById('tBody').innerHTML=s.map(t=>{
    const p=pri(t),pc=p>80?'#ef4444':p>60?'#f59e0b':p>40?'#3b82f6':'#22c55e';
    const sc=t.status==='new'?'#f59e0b':t.status==='in_progress'?'#3b82f6':'#22c55e';
    return`<tr onclick="sel(${t.id})" id="r${t.id}"><td><div class="dot" style="background:${SC[t.severity]}"></div></td><td style="font-weight:500">${TL[t.defect_type]||t.defect_type}</td><td><span class="sev" style="background:${SC[t.severity]}20;color:${SC[t.severity]}">${SL[t.severity]}</span></td><td><div class="pb"><div class="pb-f" style="width:${p}%;background:${pc}"></div></div> <b style="color:${pc}">${p}</b></td><td style="font-size:11px;color:#94a3b8">${t.address||''}</td><td>${t.detection_count}</td><td><span class="st" style="background:${sc}20;color:${sc}">${XL[t.status]||t.status}</span></td></tr>`}).join('')}

        <div class="sr"><span class="sl">גיאומטריה (30%)</span><div class="sk"><div class="sf" style="width:${Math.min(p*.87,100)}%;background:#3b82f6"></div></div><span class="sv" style="color:#3b82f6">${Math.round(p*.3)}</span></div>
        <div class="sr"><span class="sl">מוסדות (20%)</span><div class="sk"><div class="sf" style="width:95%;background:#ef4444"></div></div><span class="sv" style="color:#ef4444">19</span></div>
        <div class="sr"><span class="sl">תנועה (15%)</span><div class="sk"><div class="sf" style="width:80%;background:#f59e0b"></div></div><span class="sv" style="color:#f59e0b">12</span></div>
        <div class="sr"><span class="sl">משפטי (15%)</span><div class="sk"><div class="sf" style="width:90%;background:#a855f7"></div></div><span class="sv" style="color:#a855f7">14</span></div>
        <div class="sr"><span class="sl">סביבה (10%)</span><div class="sk"><div class="sf" style="width:75%;background:#22c55e"></div></div><span class="sv" style="color:#22c55e">8</span></div>
      </div>
    </div></div>
  <div class="ins"><div class="ins-t">תובנת AI</div><div class="ins-b">${d.defect_depth_cm?`עומק <strong>${d.defect_depth_cm} ס״מ</strong>`:'מפגע'} ${d.defect_depth_cm>10?'חורג מסף בטיחות. ':'. '}בית ספר <strong>45 מ׳</strong>. <strong>2 תביעות</strong> (₪20,500). גשם <strong>40 מ״מ</strong> צפוי. ${d.defect_depth_cm>10?'המלצה: תיקון מלא מיידי.':'המלצה: מעקב ותיקון בהתאם ל-SLA.'}</div></div>
  <div class="acts"><button class="act a1">הקצה צוות</button><button class="act a2">הזמנת עבודה</button><button class="act a2">דוח PDF</button></div>`;
  setTimeout(initPCL,100)}

function sw(id){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  document.getElementById('tc-'+id).classList.add('on');document.querySelectorAll('.tab')[id==='ov'?0:1].classList.add('on')}

// === THREE.JS PCL ===
let pSc,pCa,pRe,pPt,pRa,pMu,pDr=false,pPv={x:0,y:0},rX=-.5,rY=.3,zm=3,panX=0,panY=0,dpM=false;
let mMo=null,mSt=0,mP1=null,mP2=null,mGr,mLn,mLs=[],pAn=null;
const MC={depth:'#ef4444',width:'#3b82f6',length:'#f59e0b',angle:'#a855f7',custom:'#06b6d4'};
let pcx=0,pcy=0,pcz=0;

function initPCL(){
  if(pAn)cancelAnimationFrame(pAn);
  const cv=document.getElementById('pclCv');if(!cv)return;
  const ct=document.getElementById('pclC'),w=ct.clientWidth,h=ct.clientHeight;
  pRe=new THREE.WebGLRenderer({canvas:cv,antialias:true});pRe.setSize(w,h);pRe.setPixelRatio(Math.min(devicePixelRatio,2));pRe.setClearColor(0x0a1628);
  pSc=new THREE.Scene();pCa=new THREE.PerspectiveCamera(50,w/h,.01,100);
  pRa=new THREE.Raycaster();pRa.params.Points.threshold=.06;pMu=new THREE.Vector2();
  mGr=new THREE.Group();pSc.add(mGr);mLs=[];
  const n=PD.x.length;pcx=0;pcy=0;pcz=0;
  for(let i=0;i<n;i++){pcx+=PD.x[i];pcy+=PD.y[i];pcz+=PD.z[i]}pcx/=n;pcy/=n;pcz/=n;
  dpM=false;rX=-.5;rY=.3;zm=3;panX=0;panY=0;mkP(false);
  cv.onmousedown=e=>{pDr=true;pPv={x:e.clientX,y:e.clientY}};
  cv.onmousemove=e=>{if(!pDr)return;const dx=e.clientX-pPv.x,dy=e.clientY-pPv.y;if(e.shiftKey){panX+=dx*.003;panY-=dy*.003}else{rY+=dx*.005;rX+=dy*.005}pPv={x:e.clientX,y:e.clientY}};
  cv.onmouseup=()=>pDr=false;cv.onmouseleave=()=>pDr=false;
  cv.onwheel=e=>{zm=Math.max(.5,Math.min(10,zm+e.deltaY*.005));e.preventDefault()};
  cv.onclick=pclCk;pAni()}
function mkP(dp){
  if(pPt)pSc.remove(pPt);const n=PD.x.length,pos=new Float32Array(n*3),col=new Float32Array(n*3);
  const zMn=Math.min(...PD.z),zMx=Math.max(...PD.z),zR=zMx-zMn;
  for(let i=0;i<n;i++){pos[i*3]=PD.x[i]-pcx;pos[i*3+1]=PD.y[i]-pcy;pos[i*3+2]=PD.z[i]-pcz;
    if(dp){const t=(PD.z[i]-zMn)/zR;if(t<.33){col[i*3]=0;col[i*3+1]=t*3*.7;col[i*3+2]=.9-t*3*.4}else if(t<.66){const s=(t-.33)*3;col[i*3]=s*.9;col[i*3+1]=.7+s*.2;col[i*3+2]=.5-s*.5}else{const s=(t-.66)*3;col[i*3]=.9+s*.1;col[i*3+1]=.9-s*.6;col[i*3+2]=0}}
    else{col[i*3]=PD.r[i]/255;col[i*3+1]=PD.g[i]/255;col[i*3+2]=PD.b[i]/255}}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));
  pPt=new THREE.Points(g,new THREE.PointsMaterial({size:.03,vertexColors:true,sizeAttenuation:true}));pSc.add(pPt)}
function pAni(){pAn=requestAnimationFrame(pAni);pCa.position.set(Math.sin(rY)*Math.cos(rX)*zm+panX,Math.sin(rX)*zm+panY,Math.cos(rY)*Math.cos(rX)*zm);pCa.lookAt(panX,panY,0);pRe.render(pSc,pCa)}
function pclCk(e){if(!mMo)return;const rc=e.target.getBoundingClientRect();
  pMu.x=((e.clientX-rc.left)/rc.width)*2-1;pMu.y=-((e.clientY-rc.top)/rc.height)*2+1;
  pRa.setFromCamera(pMu,pCa);const h=pRa.intersectObject(pPt);
  if(h.length>0){const pt=h[0].point.clone();
    if(mSt===0){mP1=pt;mSt=1;addMk(pt,MC[mMo]);pSS('נקודה 1 — לחץ על שנייה')}
    else if(mSt===1){mP2=pt;mSt=2;addMk(pt,MC[mMo]);drLn(mP1,mP2,MC[mMo]);pSS('מרחק: '+(mP1.distanceTo(mP2)*100).toFixed(1)+' cm');document.getElementById('pclCf').style.display='flex'}}}
function addMk(p,c){const s=new THREE.Mesh(new THREE.SphereGeometry(.02,12,12),new THREE.MeshBasicMaterial({color:new THREE.Color(c)}));s.position.copy(p);mGr.add(s)}
function drLn(a,b,c){if(mLn)mGr.remove(mLn);mLn=new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineBasicMaterial({color:new THREE.Color(c)}));mGr.add(mLn)}
function pclM(t){pclX();mMo=t;mSt=0;mP1=null;mP2=null;document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));document.getElementById('mb-'+t).classList.add('on');document.getElementById('pclCv').classList.add('ms');pSS('לחץ נקודה 1')}
function pclOk(){if(!mP1||!mP2||!mMo)return;let v;if(mMo==='angle'){const dz=Math.abs(mP2.z-mP1.z),dxy=Math.sqrt((mP2.x-mP1.x)**2+(mP2.y-mP1.y)**2);v=(Math.atan2(dz,dxy)*180/Math.PI).toFixed(1)+'°'}else v=(mP1.distanceTo(mP2)*100).toFixed(1)+' cm';
  const el=document.getElementById('mv-'+mMo);el.textContent=v;el.classList.add('has');document.getElementById('mb-'+mMo).classList.remove('on');document.getElementById('mb-'+mMo).classList.add('dn');
  const g=new THREE.Group();mGr.children.forEach(c=>g.add(c.clone()));pSc.add(g);mLs.push(g);
  clMk();document.getElementById('pclCf').style.display='none';document.getElementById('pclCv').classList.remove('ms');mMo=null;mSt=0;pSS('נשמר: '+v);setTimeout(pHS,2000)}
function pclX(){clMk();const cf=document.getElementById('pclCf');if(cf)cf.style.display='none';const cv=document.getElementById('pclCv');if(cv)cv.classList.remove('ms');document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));mMo=null;mSt=0;mP1=null;mP2=null;pHS()}
function clMk(){while(mGr&&mGr.children.length>0)mGr.remove(mGr.children[0]);mLn=null}
function pSS(m){const el=document.getElementById('pclS');if(el){el.textContent=m;el.style.display='block'}}
function pHS(){const el=document.getElementById('pclS');if(el)el.style.display='none'}
function pclDp(){dpM=!dpM;document.getElementById('pbD').classList.toggle('on');mkP(dpM)}
function pclVw(v){if(v==='top'){rX=-1.57;rY=0}else{rX=0;rY=0}}

load();
</script>
<div class="img-overlay" id="imgOv" onclick="this.style.display='none'"><img id="imgOvS"/></div>
